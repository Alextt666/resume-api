name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 镜像名：dockerhub用户名/resume-api:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/resume-api:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/resume-api:latest
            docker stop resume-api || true
            docker rm resume-api || true
            docker run -d \
              --name resume-api \
              --network nginx-net \
              --restart unless-stopped \
              -v /data/resume-api/data:/app/data \
              ${{ secrets.DOCKER_USERNAME }}/resume-api:latest
